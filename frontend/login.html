<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login administrador | CHC</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand-block text-only-brand">
        <div>
          <p class="brand-overline">Soporte360 CHC</p>
          <h2 class="brand-title">Respaldo de pedidos</h2>
        </div>
      </div>
      <nav class="topbar-actions">
        <a class="nav-pill" href="index.html">Carga de respaldo</a>
        <span class="nav-pill nav-pill-active">Acceso admin</span>
      </nav>
    </div>
  </header>

  <main class="shell auth-center-shell">
    <section class="panel auth-panel auth-panel-centered">
      <div class="panel-heading centered-heading">
        <div>
          <span class="eyebrow">Acceso administrador</span>
          <h3>Iniciar sesión</h3>
          <p class="muted">Usa tu usuario administrador para entrar al panel.</p>
        </div>
      </div>

      <form id="loginForm" class="stack-form compact-form compact-form-center">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" autocomplete="username" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>

        <div class="form-row-actions centered-actions">
          <button type="submit" class="primary-btn full-mobile">Entrar al panel</button>
          <a href="index.html" class="ghost-link">Volver</a>
        </div>
      </form>

      <div id="loginMessage" class="feedback-box hidden"></div>
    </section>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
